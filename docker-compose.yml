services:
  api:
    build: ./apps/api
    ports:
      - "3002:3002"
    env_file: ./apps/api/.env
    depends_on:
      - db
    restart: unless-stopped

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    env_file: ./apps/web/.env
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
